<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMD AUTO CENTER - Estética Automotiva Premium</title>
    <style>
        /* Cores da Marca */
        :root {
            --preto-fundo: #0a0a0a; /* Preto quase puro para profundidade */
            --preto-card: #161616; /* Preto ligeiramente mais claro para os cards */
            --dourado-principal: #d4af37; /* Dourado metálico clássico */
            --dourado-claro: #f1e5ac; /* Dourado suave para textos secundários */
            --branco-texto: #ffffff;
            --cinza-texto: #a0a0a0;
        }

        body { 
            font-family: 'Poppins', 'Segoe UI', sans-serif; /* Fonte mais moderna e elegante */
            margin: 0; 
            padding: 0; 
            background-color: var(--preto-fundo); 
            color: var(--branco-texto); 
        }

        header { 
            background-color: #000; 
            padding: 60px 20px; 
            text-align: center; 
            border-bottom: 3px solid var(--dourado-principal); /* Linha dourada de destaque */
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); /* Sombra dourada sutil */
        }

        header h1 { 
            margin: 0; 
            font-size: 2.8rem; 
            color: var(--dourado-principal); 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        header p { 
            margin: 10px 0 0; 
            font-size: 1.1rem; 
            color: var(--dourado-claro); 
            font-weight: 300;
        }

        .container { 
            max-width: 850px; 
            margin: 0 auto; 
            padding: 50px 20px; 
        }

        h2 { 
            text-align: center; 
            color: var(--branco-texto); 
            margin-bottom: 40px; 
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Estilo da Sanfona (Accordion) Premium */
        details {
            background-color: var(--preto-card);
            margin-bottom: 18px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2a2a2a; /* Borda escura sutil */
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        details:hover {
            border-color: var(--dourado-principal); /* Borda brilha em dourado no hover */
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }
        
        summary {
            padding: 22px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
            color: var(--dourado-claro); /* Texto do título em dourado claro */
        }
        
        summary:hover { background-color: #1a1a1a; }
        
        /* Ícone de seta dourado */
        summary::after {
            content: '+'; /* Usando + e - para um visual mais clean */
            font-size: 1.5rem;
            transition: transform 0.3s, color 0.3s;
            color: var(--dourado-principal);
            font-weight: 300;
        }
        
        details[open] summary::after { 
            content: '-';
            color: var(--branco-texto);
        }
        
        .conteudo {
            padding: 25px;
            background-color: #1c1c1c; /* Fundo do conteúdo ligeiramente diferente */
            border-top: 1px solid #2a2a2a;
            line-height: 1.7;
            color: var(--cinza-texto);
            font-size: 1.05rem;
        }

        /* Botão do WhatsApp Estilizado Dourado */
        .btn-whatsapp {
            display: block;
            background: linear-gradient(45deg, #b8860b, var(--dourado-principal)); /* Gradiente dourado */
            color: #000
